- text: |
    It's OK to suck from time to time.
    偶爾搞砸、廢一下也是可以的啦。
    たまにはダメダメ認めても大丈夫だよ。
  output_path: "./output/motivation_fixed.png"
  size: [2560, 1600]
  font_size: 96
  source: "VP"
  display_source: true

- text: "I don't believe in the no-win scenario."
  output_path: "./output/motivation_fixed-2.png"
  size: [2560, 1600]
  font_size: 130
  source: "Star Trek"
  display_source: true

- text: |
    Focus on the solution,
    not the problem.
  output_path: "./output/motivation_custom_bg.png"
  size: [2560, 1600]
  bg_color: "#2c3e50"
  font_size: 150

